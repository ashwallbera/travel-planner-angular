<div class="trip-header">
  @if (trip().coverPhotoUrl) {
    <img class="trip-header__cover" [src]="trip().coverPhotoUrl" alt="" />
  }
  <div>
    <div class="trip-header__row">
      <h1>{{ trip().name }}</h1>
      @if (!editing()) {
        <button type="button" class="btn btn--ghost btn--sm" (click)="editing.set(true)">Edit</button>
      }
    </div>
    @if (!editing()) {
      <p>{{ destination() }}</p>
      <p class="trip-header__dates">{{ dateRange() }}</p>
      <app-trip-countdown [startDate]="trip().startDate" [endDate]="trip().endDate" />
    } @else {
      <div class="card trip-header__edit">
        <app-trip-edit-form
          [trip]="trip()"
          (saved)="editing.set(false)"
          (cancelled)="editing.set(false)"
        />
      </div>
    }
  </div>
</div>
