@if (moreOpen()) {
  <div class="more-backdrop" (click)="closeMore()" aria-hidden="true"></div>
  <div class="more-sheet" role="dialog" aria-label="More trip sections">
    @for (link of moreLinks; track link.path) {
      <a
        [routerLink]="['/trips', tripId(), link.path]"
        routerLinkActive="more-sheet__link--active"
        class="more-sheet__link"
        (click)="closeMore()"
      >
        <span class="more-sheet__icon">{{ link.icon }}</span>
        {{ link.label }}
      </a>
    }
  </div>
}
<nav class="bottom-nav" aria-label="Trip navigation">
  @for (tab of primaryTabs; track tab.path) {
    <a
      [routerLink]="['/trips', tripId(), tab.path]"
      routerLinkActive="bottom-nav__item--active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="bottom-nav__item"
      (click)="closeMore()"
    >
      <span class="bottom-nav__icon">{{ tab.icon }}</span>
      <span class="bottom-nav__label">{{ tab.label }}</span>
    </a>
  }
  <button
    type="button"
    class="bottom-nav__item"
    [class.bottom-nav__item--active]="moreOpen()"
    (click)="moreOpen.set(!moreOpen())"
    [attr.aria-expanded]="moreOpen()"
    aria-haspopup="true"
  >
    <span class="bottom-nav__icon">⋯</span>
    <span class="bottom-nav__label">More</span>
  </button>
</nav>
